<!DOCTYPE html>
<html>
    <head>
        <title>smaddok</title>
        <link rel="icon" href="{{url_for('static',filename='assets/3.png')}}" type="image/x-icon">
        <link rel="stylesheet" href="{{ url_for('static', filename='login/login.css')}}">
    </head>
    <body>
        <div id="nav">
            <a href="/"><div class="navbar" id="n1"><h>home</h></div></a>
            {% if 'user' not in session %}
                <a href="/user/daftar"><div class="navbar" id="n2"><h>daftar</h></div></a>
                <a href="/user/login"><div class="navbar" id="n3"><h>login</h></div></a>
            {% else %}
                <div class="navbar" id="n2" style="background-color: transparent;"><h>{{session['user']}}</h></div>
                <a href="/user/logout/submit"><div class="navbar" id="n3"><h>logout</h></div></a>
            {% endif %}
        </div>
        <div id="daftar">
            <h1 id="h_daftar">login dulu</h1>
                <div id="input1">
                    <input
                    type="text"
                    id="nama"
                    name='nama'
                    placeholder="masukkan nama">
                </div>
                <div id="input2">
                    <input
                    type="text"
                    id="password"
                    name='password'
                    placeholder="masukkan password">
                </div>
                <div id="submit_box">
                    <button type="submit" id="submit">login</button>
                </div>
        </div>
        <script src="{{url_for('static', filename='login/login.js')}}"></script>
    </body>
</html>
